<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story 💕</title>
    <style>
        /* 1. CARA PASANG FONT SENDIRI */
        @font-face {
            font-family: 'FontRomantis';
            src: url('font-ku.ttf'); /* Memanggil file font kamu */
        }

        /* 2. ATUR LATAR BELAKANG WARNA PINK */
        body {
            background-color: #ffb6c1; /* Warna pink muda yang lembut */
            font-family: 'FontRomantis', sans-serif; /* Memakai font kamu */
            color: #d11a5b; /* Warna teks pink tua agar kontras */
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* 3. HIASAN BUNGA DAN LOVE DI ATAS WEBSITE */
        .hiasan-atas {
            font-size: 24px;
            padding: 20px 0;
            letter-spacing: 5px;
        }

        /* 4. KOTAK UTAMA UNTUK FOTO DAN TEKS */
        .kotak-cinta {
            background: rgba(255, 255, 255, 0.6); /* Kotak putih transparan yang estetik */
            margin: 20px auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        /* 5. ATUR FOTO AGAR RAPI DAN CANTIK */
        .foto-kita {
            width: 100%;
            max-width: 300px; /* Ukuran foto pas di layar HP */
            border-radius: 15px; /* Pojok foto melengkung biar gemas */
            border: 5px solid white; /* Bingkai putih seperti foto Polaroid */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 28px;
            margin-top: 15px;
        }

        p {
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- Hiasan bunga dan love di sepanjang atas website -->
    <div class="hiasan-atas">🌸 ✨ 💕 🌸 ✨ 💕 🌸</div>

    <!-- Kotak isi website -->
    <div class="kotak-cinta">
        <!-- MEMASANG FOTO KAMU DAN CEWE KAMU -->
        <img src="foto-kita.jpg" alt="Foto Kita" class="foto-kita">
        
        <h1>Aku & Kamu Selamanya 👩‍❤️‍👨</h1>
        <p>Website ini dibuat spesial untuk cewe tersayangku. Setiap sudut halaman ini penuh dengan rasa sayang dan kenangan indah kita berdua.</p>
    </div>

    <!-- Hiasan bunga dan love di sepanjang bawah website -->
    <div class="hiasan-atas">💕 🌸 ✨ 💕 🌸 ✨ 💕</div>

</body>
</html>
